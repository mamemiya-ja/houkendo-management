<style>
:root {
  color-scheme: light;
  --bg: #f4f5f2;
  --surface: #ffffff;
  --surface-soft: #f8faf7;
  --ink: #17211d;
  --muted: #66716c;
  --line: #dfe5df;
  --accent: #176b5b;
  --accent-strong: #0d4f42;
  --gold: #b28236;
  --danger: #b33a3a;
  --shadow: 0 14px 40px rgba(31, 45, 38, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  background: #1e2b26;
  color: #f7fbf8;
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  background: #e9f2ee;
  color: var(--accent-strong);
  font-weight: 800;
  border-radius: 8px;
}

.brand h1,
.brand p,
.topbar h2,
.topbar p,
.panel h3 {
  margin: 0;
}

.brand h1 {
  font-size: 18px;
}

.brand p,
.eyebrow {
  color: #aebbb5;
  font-size: 12px;
}

.nav {
  display: grid;
  gap: 6px;
}

.nav-item,
.ghost-button {
  border: 1px solid transparent;
  background: transparent;
  color: #edf5f1;
  text-align: left;
  padding: 10px 12px;
  border-radius: 8px;
}

.nav-item:hover,
.nav-item.active {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.12);
}

.side-actions {
  margin-top: auto;
  display: grid;
  gap: 8px;
}

.ghost-button {
  text-align: center;
  background: rgba(255, 255, 255, 0.08);
}

.save-status {
  padding: 10px 12px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.06);
  color: #dce8e2;
  font-size: 12px;
}

.save-status.ready {
  border-color: rgba(133, 210, 176, 0.55);
  color: #d9f4e8;
}

.save-status.warning {
  border-color: rgba(242, 187, 94, 0.65);
  color: #ffe4b5;
}

.cloud-status {
  padding: 10px 12px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.06);
  color: #dce8e2;
  font-size: 12px;
}

.cloud-status.ready {
  border-color: rgba(133, 210, 176, 0.55);
  color: #d9f4e8;
}

.cloud-status.warning {
  border-color: rgba(242, 187, 94, 0.65);
  color: #ffe4b5;
}

.cloud-status.error {
  border-color: rgba(230, 115, 115, 0.7);
  color: #ffd2d2;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink);
  font-size: 13px;
}

.checkbox-label input {
  width: auto;
}

.field-help {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
}
.file-button input {
  display: none;
}

.workspace {
  padding: 24px;
  min-width: 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 22px;
}

.topbar h2 {
  font-size: 28px;
}

.top-actions,
.form-actions,
.panel-head,
.totals,
.segmented {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.primary-button,
.secondary-button,
.text-button {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 14px;
  background: var(--surface);
  color: var(--ink);
}

.primary-button {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.primary-button:hover {
  background: var(--accent-strong);
}

.secondary-button:hover,
.text-button:hover {
  border-color: var(--accent);
}

.text-button {
  padding: 6px 10px;
  color: var(--accent-strong);
}

.view {
  display: none;
}

.view.active {
  display: block;
}

.setup-prompt {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
  padding: 16px 18px;
  border: 1px solid #e8c472;
  border-left: 5px solid var(--gold);
  border-radius: 8px;
  background: #fff8e8;
  box-shadow: var(--shadow);
}

.setup-prompt[hidden] {
  display: none;
}

.setup-prompt strong {
  display: block;
  margin-bottom: 4px;
}

.setup-prompt p {
  margin: 0;
  color: var(--muted);
}

.setup-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}

.metric,
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.metric {
  padding: 18px;
}

.metric span {
  display: block;
  color: var(--muted);
  font-size: 12px;
}

.metric strong {
  display: block;
  margin-top: 8px;
  font-size: 26px;
}

.panel {
  padding: 18px;
  min-width: 0;
}

.panel + .panel {
  margin-top: 18px;
}

.panel-head {
  justify-content: space-between;
  margin-bottom: 14px;
}

.two-column,
.split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 18px;
}

.split {
  grid-template-columns: 420px minmax(0, 1fr);
}

.form-panel,
.settings-panel {
  align-self: start;
}

form {
  display: grid;
  gap: 12px;
}

label {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 12px;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: #fff;
  color: var(--ink);
}

textarea {
  resize: vertical;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.form-row.wide {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.search {
  max-width: 240px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 720px;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 9px 8px;
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--muted);
  font-size: 12px;
  background: var(--surface-soft);
}

td.numeric,
th.numeric {
  text-align: right;
}

.row-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.icon-action {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  padding: 4px 8px;
  white-space: nowrap;
}

.icon-action.danger {
  color: var(--danger);
}

.entry-lines {
  display: grid;
  gap: 8px;
}

.entry-line {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) 110px 120px 1fr 44px;
  gap: 8px;
  align-items: end;
  padding: 10px;
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.editable-table input {
  min-width: 72px;
  padding: 6px 8px;
}

.totals {
  justify-content: flex-end;
  padding: 12px;
  background: var(--surface-soft);
  border-radius: 8px;
}

.totals span {
  color: var(--muted);
}

.totals strong {
  color: var(--ink);
  margin-left: 5px;
}

.segmented {
  gap: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}

.segmented button {
  border: 0;
  border-left: 1px solid var(--line);
  background: #fff;
  padding: 8px 12px;
}

.segmented button:first-child {
  border-left: 0;
}

.segmented button.active {
  background: var(--accent);
  color: #fff;
}

.list {
  display: grid;
  gap: 8px;
}

.list-item {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 10px;
  background: var(--surface-soft);
  border-radius: 8px;
}

.muted {
  color: var(--muted);
}

.image-preview {
  display: none;
  width: 100%;
  max-height: 160px;
  object-fit: contain;
  border: 1px solid var(--line);
  border-radius: 8px;
}

#toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  padding: 11px 14px;
  background: #1e2b26;
  color: #fff;
  border-radius: 8px;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: 0.2s ease;
  z-index: 10;
}

#toast.show {
  opacity: 1;
  transform: translateY(0);
}

#printArea {
  display: none;
}

.onboarding {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(23, 33, 29, 0.58);
}

.onboarding[hidden] {
  display: none;
}

.onboarding-card {
  width: min(560px, 100%);
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 22px 80px rgba(20, 30, 25, 0.28);
  padding: 22px;
}

.onboarding-head,
.onboarding-actions,
.onboarding-actions > div {
  display: flex;
  align-items: center;
  gap: 10px;
}

.onboarding-head {
  justify-content: space-between;
  margin-bottom: 12px;
}

.onboarding-head span {
  color: var(--muted);
  font-size: 12px;
}

.onboarding-card h2 {
  margin: 0 0 10px;
  font-size: 22px;
}

.onboarding-card p {
  margin: 0;
  color: var(--muted);
  white-space: pre-wrap;
}

.onboarding-actions {
  justify-content: space-between;
  margin-top: 20px;
}

.document {
  width: 210mm;
  min-height: 297mm;
  padding: 16mm;
  background: #fff;
  color: #111;
  font-family: "Yu Gothic", "Meiryo", sans-serif;
}

.doc-head {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  border-bottom: 2px solid #111;
  padding-bottom: 12px;
}

.doc-title {
  font-size: 22px;
  letter-spacing: 0;
  margin: 0 0 14px;
}

.doc-meta {
  min-width: 70mm;
  font-size: 12px;
}

.doc-parties {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 18px 0;
}

.doc-total {
  border: 2px solid #111;
  padding: 10px 12px;
  font-size: 18px;
  font-weight: 700;
  margin: 12px 0;
}

.doc-table {
  min-width: 0;
  font-size: 11px;
}

.doc-table th,
.doc-table td {
  border: 1px solid #333;
  padding: 5px;
}

.doc-note {
  white-space: pre-wrap;
  border: 1px solid #888;
  padding: 8px;
  min-height: 22mm;
  margin-top: 12px;
  font-size: 12px;
}

@media (max-width: 980px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
  }

  .nav {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .stats-grid,
  .two-column,
  .split {
    grid-template-columns: 1fr;
  }

  .setup-prompt {
    align-items: stretch;
    flex-direction: column;
  }

  .onboarding-actions {
    align-items: stretch;
    flex-direction: column-reverse;
  }

  .onboarding-actions > div {
    justify-content: flex-end;
  }

  .form-row,
  .form-row.wide,
  .entry-line {
    grid-template-columns: 1fr;
  }
}


@media (max-width: 720px) {
  body {
    font-size: 16px;
    line-height: 1.6;
    -webkit-text-size-adjust: 100%;
  }

  .app-shell {
    min-height: auto;
  }

  .sidebar {
    padding: 16px 14px 14px;
    gap: 16px;
  }

  .brand {
    gap: 10px;
  }

  .brand-mark {
    width: 40px;
    height: 40px;
    flex: 0 0 auto;
    font-size: 17px;
  }

  .brand h1 {
    font-size: 19px;
  }

  .brand p,
  .eyebrow {
    font-size: 13px;
  }

  .nav {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .nav-item,
  .ghost-button {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 12px 10px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    touch-action: manipulation;
  }

  .side-actions {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .save-status,
  .cloud-status {
    grid-column: 1 / -1;
    padding: 11px 12px;
    font-size: 13px;
  }

  .workspace {
    padding: 16px 12px 24px;
  }

  .topbar {
    align-items: stretch;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .topbar h2 {
    font-size: 26px;
  }

  .top-actions,
  .form-actions,
  .setup-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    width: 100%;
  }

  .top-actions button,
  .form-actions button,
  .setup-actions button,
  .panel-head > button {
    width: 100%;
  }

  .primary-button,
  .secondary-button,
  .text-button,
  .icon-action,
  .segmented button {
    min-height: 44px;
    padding: 11px 14px;
    font-size: 15px;
    touch-action: manipulation;
  }

  .text-button {
    padding: 10px 12px;
  }

  .stats-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .metric {
    padding: 14px;
  }

  .metric span {
    font-size: 13px;
  }

  .metric strong {
    margin-top: 4px;
    font-size: 24px;
  }

  .panel {
    padding: 14px 12px;
  }

  .panel + .panel {
    margin-top: 14px;
  }

  .panel-head {
    align-items: stretch;
    flex-direction: column;
    gap: 10px;
  }

  .panel h3,
  .panel-head h3 {
    font-size: 18px;
  }

  .search {
    width: 100%;
    max-width: none;
  }

  form {
    gap: 14px;
  }

  label {
    gap: 6px;
    font-size: 13px;
  }

  input,
  select,
  textarea {
    min-height: 46px;
    padding: 11px 12px;
    font-size: 16px;
  }

  textarea {
    min-height: 82px;
  }

  .checkbox-label {
    align-items: flex-start;
    font-size: 15px;
  }

  .checkbox-label input {
    width: 20px;
    height: 20px;
    margin-top: 2px;
  }

  .entry-lines {
    gap: 10px;
  }

  .entry-line {
    gap: 10px;
    padding: 12px;
  }

  .entry-line > button {
    width: 100%;
  }

  .table-wrap {
    margin-inline: -2px;
    padding-bottom: 4px;
  }

  table {
    min-width: 640px;
  }

  th,
  td {
    padding: 11px 10px;
    font-size: 14px;
  }

  th {
    font-size: 13px;
  }

  .row-actions {
    justify-content: flex-start;
    flex-wrap: wrap;
  }

  .icon-action {
    min-width: 44px;
    border-radius: 8px;
  }

  .editable-table input {
    min-width: 84px;
    min-height: 42px;
    padding: 9px 10px;
    font-size: 16px;
  }

  .totals {
    align-items: stretch;
    flex-direction: column;
    gap: 6px;
    font-size: 15px;
  }

  .totals span {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .totals strong {
    margin-left: 0;
  }

  .segmented {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    width: 100%;
  }

  .segmented button {
    padding: 10px 8px;
    font-size: 14px;
  }

  .list-item {
    align-items: stretch;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
    font-size: 15px;
  }

  .onboarding {
    align-items: end;
    padding: 12px;
  }

  .onboarding-card {
    max-height: calc(100vh - 24px);
    overflow: auto;
    padding: 18px 16px;
  }

  .onboarding-head span {
    font-size: 13px;
  }

  .onboarding-card h2 {
    font-size: 22px;
  }

  .onboarding-card p {
    font-size: 15px;
  }

  #toast {
    right: 12px;
    bottom: 14px;
    left: 12px;
    padding: 13px 14px;
    font-size: 15px;
    text-align: center;
  }
}

@media (max-width: 380px) {
  .top-actions,
  .form-actions,
  .setup-actions,
  .side-actions {
    grid-template-columns: 1fr;
  }
}



@media (max-width: 980px), (hover: none) and (pointer: coarse) {
  body {
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    font-size: 17px;
    line-height: 1.65;
    -webkit-text-size-adjust: 100%;
  }

  .app-shell {
    display: block;
    min-height: auto;
  }

  .sidebar {
    position: static;
    display: grid;
    gap: 8px;
    padding: 12px 14px 10px;
  }

  .brand {
    gap: 10px;
    min-height: 40px;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    flex: 0 0 auto;
    font-size: 17px;
    border-radius: 8px;
  }

  .brand h1 {
    font-size: 17px;
    line-height: 1.2;
  }

  .brand p,
  .eyebrow {
    display: none;
  }

  .side-actions {
    display: block;
    margin-top: 0;
  }

  .side-actions > * {
    display: none !important;
  }

  .side-actions #googleDriveStatus,
  .side-actions #autoSaveStatus,
  .side-actions #oneDriveStatus {
    display: flex !important;
    align-items: center;
    width: 100%;
    min-height: 34px;
    padding: 7px 10px;
    overflow: hidden;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.35;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .nav {
    position: fixed;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: 30;
    display: flex;
    gap: 8px;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    overflow-x: auto;
    background: rgba(30, 43, 38, 0.98);
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 -14px 34px rgba(18, 29, 24, 0.22);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .nav::-webkit-scrollbar {
    display: none;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 92px;
    min-height: 48px;
    padding: 7px 8px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    touch-action: manipulation;
  }

  .nav-item.active {
    background: #e9f2ee;
    color: var(--accent-strong);
    border-color: transparent;
  }

  .workspace {
    padding: 18px 14px 24px;
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr;
    align-items: stretch;
    gap: 10px;
    margin-bottom: 14px;
  }

  .topbar h2 {
    font-size: 28px;
    line-height: 1.2;
  }

  .top-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    width: 100%;
  }

  #seedData {
    display: none;
  }

  .top-actions button,
  .form-actions button,
  .setup-actions button {
    width: 100%;
  }

  .primary-button,
  .secondary-button,
  .text-button,
  .icon-action,
  .segmented button {
    min-height: 48px;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 16px;
    touch-action: manipulation;
  }

  .stats-grid {
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric {
    min-height: 104px;
    padding: 18px;
  }

  .metric span {
    font-size: 15px;
